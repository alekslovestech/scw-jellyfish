  <path d="M107,60 Q111,75 107,89 Q111,103 107,107" stroke="#3377cc" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M120,60 Q125,74 120,88 Q125,100 120,107" stroke="#3377cc" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Central tentacles -->
